{% if page.file and page.file.src_path in ["index.md", "index.zh.md"] %}
<script src="https://giscus.app/client.js"
        data-repo="Deerainy/HNU-SE-notes"
        data-repo-id="R_kgDOQmlVkQ"
        data-category="General"
        data-category-id="DIC_kwDOQmlVkc4C0Hzl"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
</script>
<script>
  document$.subscribe(() => {
    const giscus = document.querySelector("iframe.giscus-frame");
    if (giscus) {
      const scheme = document.body.getAttribute("data-md-color-scheme");
      const theme = scheme === "slate" ? "dark_tritanopia" : "light_tritanopia";
      giscus.contentWindow.postMessage(
        { giscus: { setConfig: { theme } } },
        "https://giscus.app"
      );
    }
  });
  const observer = new MutationObserver(() => {
    const giscus = document.querySelector("iframe.giscus-frame");
    if (giscus) {
      const scheme = document.body.getAttribute("data-md-color-scheme");
      const theme = scheme === "slate" ? "dark_tritanopia" : "light_tritanopia";
      giscus.contentWindow.postMessage(
        { giscus: { setConfig: { theme } } },
        "https://giscus.app"
      );
    }
  });
  observer.observe(document.body, {
    attributes: true,
    attributeFilter: ["data-md-color-scheme"],
  });
</script>
{% endif %}
